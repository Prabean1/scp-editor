name: Manual release build

# Manual trigger only — this never runs on push/PR/tag. Run it from the
# Actions tab ("Run workflow") whenever you actually want installers built
# and published, not on every commit.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create, e.g. v0.2.0'
        required: true
        type: string
      draft:
        description: 'Create as a draft release (recommended — lets you review/attach notes before it goes public)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact-glob: dist/*.exe
          - os: macos-latest
            script: build:mac
            artifact-glob: dist/*.dmg
          - os: ubuntu-latest
            script: build:linux
            artifact-glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.snap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: installers/**
          fail_on_unmatched_files: true
